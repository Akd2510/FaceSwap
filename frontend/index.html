<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceSwap Pro Local</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>FaceSwap Pro Local</h1>
        <p>Local AI Face Swapping — No GPU, No Cloud</p>
    </header>

    <main class="app-container">
        <section class="panel source-panel">
            <h2>1. Your Face</h2>
            <div id="source-drop-zone" class="drop-zone">
                <input type="file" id="source-input" hidden accept="image/*">
                <div class="drop-zone-content">
                    <span class="icon">👤</span>
                    <p>Drag & Drop or Click to Upload</p>
                    <small>Front-facing, clear lighting</small>
                </div>
                <img id="source-preview" class="preview-img hidden">
            </div>
        </section>

        <section class="panel template-panel">
            <h2>2. Choose Template</h2>
            <div class="template-controls">
                <button id="upload-custom-btn" class="secondary-btn">Upload Custom</button>
                <input type="file" id="custom-template-input" hidden accept="image/*">
            </div>
            <div id="template-grid" class="template-grid">
                <!-- Templates loaded via JS -->
                <div class="loader">Loading templates...</div>
            </div>
            <div id="selected-template-preview-container" class="hidden">
                <p>Selected Custom:</p>
                <img id="custom-template-preview" class="preview-img">
            </div>
        </section>

        <section class="panel result-panel">
            <h2>3. Result</h2>
            <div id="result-container" class="result-container">
                <div id="result-placeholder" class="placeholder">
                    <span class="icon">✨</span>
                    <p>Result will appear here</p>
                </div>
                <div id="warnings-container"></div>
                <img id="result-img" class="result-img hidden">
                <div id="result-actions" class="hidden">
                    <a id="download-btn" class="primary-btn" download="faceswap_result.png">Download Result</a>
                    <button id="reset-btn" class="secondary-btn">Try Another</button>
                </div>
            </div>
        </section>
    </main>

    <div class="controls-bar">
        <label class="enhance-toggle">
            <input type="checkbox" id="enhance-checkbox" checked>
            <span>Enhance quality (slower)</span>
        </label>
        <button id="swap-btn" class="swap-btn" disabled>SWAP FACES</button>
        <div id="error-message" class="error-text hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
